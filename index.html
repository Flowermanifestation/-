<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ 灵境显化 - Manifestation App</title>

    <!-- App 图标与移动端优化 -->
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="灵境显化">

    <style>
        :root {
            --bg-deep: #0a0a14;
            --bg-card: #13132b;
            --bg-card-hover: #1a1a3a;
            --gold: #d4a853;
            --gold-light: #f0d78c;
            --purple: #7b5ea7;
            --purple-light: #a78cc4;
            --lavender: #c4b5e0;
            --text: #e8e0f0;
            --text-dim: #9a8ab8;
            --accent-pink: #e087a0;
            --accent-teal: #5fb9b0;
            --danger: #e05570;
            --success: #6dbf8a;
            --star: #fffbe6;
            --border: rgba(180, 160, 210, 0.2);
            --glow-purple: rgba(130, 100, 180, 0.5);
            --glow-gold: rgba(220, 170, 80, 0.4);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --font-display: 'Georgia', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            --nav-height: 72px;
            --header-height: 56px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: #0d0d1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(130, 90, 180, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(200, 150, 70, 0.1) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 80%, rgba(100, 140, 180, 0.08) 0%, transparent 50%);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; /* 防止浏览器回弹效果 */
        }

        /* Stars background */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            30% { opacity: 0.9; transform: scale(1.6); }
            60% { opacity: 0.4; transform: scale(0.8); }
        }

        /* Phone frame */
        .phone-frame {
            position: relative;
            z-index: 1;
            width: 400px;
            height: 860px;
            background: var(--bg-deep);
            border-radius: 44px;
            overflow: hidden;
            box-shadow:
                var(--shadow-lg),
                0 0 0 3px #1a1a35,
                0 0 0 6px #111122,
                0 0 0 8px rgba(180, 150, 210, 0.3),
                0 0 80px rgba(140, 100, 200, 0.25);
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 440px) {
            .phone-frame {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
        }

        /* Status bar */
        .status-bar {
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            background: rgba(10, 10, 20, 0.95);
            z-index: 10;
        }
        .status-icons { display: flex; gap: 6px; align-items: center; font-size: 11px; }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--success); box-shadow: 0 0 6px var(--success);
        }

        /* Main content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px 18px 18px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .main-content::-webkit-scrollbar { width: 3px; }
        .main-content::-webkit-scrollbar-thumb {
            background: rgba(180, 150, 210, 0.3); border-radius: 10px;
        }

        /* Page panels */
        .page { display: none; flex-direction: column; gap: 16px; animation: fadeSlideIn 0.35s ease; }
        .page.active { display: flex; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .app-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .app-header .greeting { font-family: var(--font-display); font-size: 22px; color: var(--text); letter-spacing: 1px; }
        .app-header .greeting span {
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold;
        }
        .header-icon-btn {
            width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card);
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px; transition: all 0.2s; color: var(--text-dim);
        }
        .header-icon-btn:hover {
            background: var(--bg-card-hover); border-color: rgba(200, 160, 100, 0.4);
            box-shadow: 0 0 20px var(--glow-gold); color: var(--gold-light);
        }

        /* Energy orb */
        .energy-orb-container { display: flex; align-items: center; justify-content: center; padding: 8px 0; flex-shrink: 0; position: relative; }
        .energy-orb {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, rgba(240, 210, 140, 0.6) 0%, rgba(160, 100, 200, 0.5) 30%, rgba(60, 30, 90, 0.7) 60%, rgba(20, 10, 40, 0.9) 100%);
            box-shadow: 0 0 60px var(--glow-purple), 0 0 100px rgba(180, 130, 60, 0.3), inset 0 0 40px rgba(200, 160, 220, 0.25);
            animation: orbPulse 3s ease-in-out infinite; display: flex; align-items: center; justify-content: center; flex-direction: column;
            cursor: pointer; transition: transform 0.3s; position: relative;
        }
        .energy-orb:active { transform: scale(0.94); }
        .energy-orb .orb-value { font-family: var(--font-display); font-size: 36px; font-weight: bold; color: #fff; text-shadow: 0 0 30px rgba(255, 220, 150, 0.8); letter-spacing: 2px; }
        .energy-orb .orb-label { font-size: 11px; color: var(--lavender); letter-spacing: 2px; text-transform: uppercase; }
        @keyframes orbPulse {
            0%, 100% { box-shadow: 0 0 60px var(--glow-purple), 0 0 100px rgba(180, 130, 60, 0.3); }
            50% { box-shadow: 0 0 90px rgba(180, 120, 200, 0.7), 0 0 140px rgba(200, 150, 70, 0.5); }
        }
        .orb-ring {
            position: absolute; width: 140px; height: 140px; border-radius: 50%;
            border: 2px dashed rgba(200, 160, 220, 0.4); animation: ringSpin 20s linear infinite; pointer-events: none;
        }
        @keyframes ringSpin { to { transform: rotate(360deg); } }

        /* Cards */
        .card {
            background: var(--bg-card); border-radius: var(--radius-lg); padding: 18px 16px;
            border: 1px solid var(--border); transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden; flex-shrink: 0;
        }
        .card:hover { border-color: rgba(180, 150, 210, 0.5); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(150, 110, 190, 0.06) 0%, transparent 60%); pointer-events: none;
        }
        .card-title { font-family: var(--font-display); font-size: 16px; color: var(--text); letter-spacing: 1px; margin-bottom: 8px; position: relative; z-index: 1; }
        .card-subtitle { font-size: 13px; color: var(--text-dim); position: relative; z-index: 1; line-height: 1.5; }

        /* Angel number card */
        .angel-number-display {
            font-family: var(--font-display); font-size: 48px; text-align: center; color: #fff;
            letter-spacing: 8px; text-shadow: 0 0 40px rgba(255, 200, 100, 0.7); animation: numberGlow 2s ease-in-out infinite;
            position: relative; z-index: 1;
        }
        @keyframes numberGlow {
            0%, 100% { text-shadow: 0 0 40px rgba(255, 200, 100, 0.7); }
            50% { text-shadow: 0 0 70px rgba(255, 220, 140, 1), 0 0 120px rgba(200, 150, 80, 0.6); }
        }
        .angel-meaning { text-align: center; font-size: 13px; color: var(--lavender); letter-spacing: 1px; position: relative; z-index: 1; margin-top: 4px; font-style: italic; }

        /* Affirmation */
        .affirmation-box {
            background: linear-gradient(135deg, rgba(120, 80, 160, 0.3), rgba(60, 30, 100, 0.3));
            border-radius: var(--radius-lg); padding: 22px 18px; text-align: center; border: 1px solid rgba(180, 140, 200, 0.3);
            position: relative; cursor: pointer; transition: all 0.3s; flex-shrink: 0;
        }
        .affirmation-box:hover { border-color: rgba(200, 160, 100, 0.5); box-shadow: 0 0 40px rgba(160, 100, 200, 0.3); }
        .affirmation-text { font-family: var(--font-display); font-size: 18px; color: #fff; letter-spacing: 2px; line-height: 1.6; font-style: italic; }
        .affirmation-label { font-size: 10px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }

        /* Oracle card */
        .oracle-card {
            background: linear-gradient(180deg, #1a1050, #0d0828); border-radius: var(--radius-xl); padding: 28px 20px;
            text-align: center; border: 2px solid rgba(180, 150, 210, 0.4); cursor: pointer; transition: all 0.4s;
            position: relative; overflow: hidden; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .oracle-card:hover { transform: translateY(-4px); box-shadow: 0 20px 50px rgba(100, 60, 160, 0.5); border-color: rgba(220, 180, 100, 0.6); }
        .oracle-card .oracle-icon { font-size: 60px; animation: floatIcon 3s ease-in-out infinite; }
        @keyframes floatIcon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .oracle-card .oracle-name { font-family: var(--font-display); font-size: 20px; color: #fff; letter-spacing: 2px; margin-top: 8px; }
        .oracle-card .oracle-desc { font-size: 12px; color: var(--lavender); margin-top: 6px; letter-spacing: 1px; }
        .oracle-card .tap-hint { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; margin-top: 12px; opacity: 0.7; }

        /* Lists */
        .gratitude-input-area { display: flex; gap: 10px; flex-shrink: 0; }
        .gratitude-input-area input {
            flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 25px;
            padding: 12px 18px; color: var(--text); font-size: 14px; outline: none; transition: all 0.3s; font-family: var(--font-body);
        }
        .gratitude-input-area input:focus { border-color: var(--purple-light); box-shadow: 0 0 20px rgba(150, 100, 200, 0.3); }
        .btn-send {
            width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--purple), #5a3d8a);
            border: none; color: #fff; font-size: 18px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .gratitude-list { display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto; }
        .gratitude-item {
            background: var(--bg-card); border-radius: var(--radius-sm); padding: 12px 14px; display: flex;
            align-items: center; gap: 10px; font-size: 13px; color: var(--text); border: 1px solid var(--border);
        }
        .gratitude-item .delete-btn { margin-left: auto; cursor: pointer; color: var(--text-dim); border: none; background: none; }

        /* Meditation timer */
        .meditation-circle {
            width: 160px; height: 160px; border-radius: 50%; border: 4px solid rgba(180, 150, 210, 0.3);
            display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; margin: 0 auto;
        }
        .meditation-circle.active { border-color: var(--gold-light); animation: meditatePulse 1.5s ease-in-out infinite; }
        .meditation-time { font-family: var(--font-display); font-size: 38px; color: #fff; letter-spacing: 3px; }
        .meditation-presets { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .preset-btn { padding: 8px 16px; border-radius: 20px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; }
        .preset-btn.active-preset { background: rgba(150, 100, 200, 0.3); border-color: var(--purple-light); color: #fff; }

        /* Vision board */
        .vision-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .vision-cell {
            aspect-ratio: 1; border-radius: var(--radius-md); background: var(--bg-card); border: 2px dashed var(--border);
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 36px; flex-direction: column;
        }
        .vision-cell.filled { border-style: solid; background: linear-gradient(135deg, rgba(100, 60, 150, 0.4), rgba(40, 20, 80, 0.5)); font-size: 14px; color: #fff; padding: 8px; }

        /* Bottom Nav */
        .bottom-nav {
            height: var(--nav-height); display: flex; align-items: center; justify-content: space-around;
            background: rgba(13, 13, 28, 0.95); border-top: 1px solid var(--border); backdrop-filter: blur(20px);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: var(--text-dim); font-size: 10px; background: none; border: none; }
        .nav-item.active { color: var(--gold-light); }
        .nav-badge { position: absolute; top: -2px; right: 2px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent-pink); }

        /* Utils */
        .toast {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(30, 20, 50, 0.95);
            color: #fff; padding: 10px 22px; border-radius: 25px; font-size: 13px; opacity: 0; transition: all 0.4s; z-index: 100;
        }
        .toast.show { opacity: 1; top: 75px; }
        .modal-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7); z-index: 50; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal-content { background: var(--bg-card); border-radius: var(--radius-xl); padding: 28px 20px; text-align: center; border: 1px solid var(--border); width: 85%; max-width: 320px; }
        .ripple { position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.4); transform: scale(0); animation: rippleEffect 0.6s ease-out; pointer-events: none; }
        @keyframes rippleEffect { to { transform: scale(4); opacity: 0; } }
        .pulse-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--gold-light); animation: dotPulse 1.5s ease-in-out infinite; margin-right: 6px; }
        @keyframes dotPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="stars-container" id="starsContainer"></div>

    <div class="phone-frame" id="phoneFrame">
        <div class="status-bar">
            <span>9:41</span>
            <div class="status-icons">
                <span class="status-dot"></span>
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <div class="main-content" id="mainContent">
            <!-- PAGE 0: 首页 Home -->
            <div class="page active" id="page-home">
                <div class="app-header">
                    <div class="greeting">✨ <span>灵境显化</span></div>
                    <div class="header-icon-btn" onclick="refreshEnergy()">🔄</div>
                </div>
                <div class="energy-orb-container">
                    <div class="orb-ring"></div>
                    <div class="energy-orb" id="energyOrb" onclick="refreshEnergy()">
                        <div class="orb-value" id="orbValue">777</div>
                        <div class="orb-label">能量频率</div>
                    </div>
                </div>
                <div style="text-align:center;font-size:11px;color:var(--text-dim);letter-spacing:2px;">
                    <span class="pulse-dot"></span>宇宙信号已对齐
                </div>
                <div class="angel-number-display" id="angelNumber">11:11</div>
                <div class="angel-meaning" id="angelMeaning">天使在你身边，保持正念</div>
                <div class="affirmation-box" id="affirmationBox" onclick="newAffirmation()">
                    <div class="affirmation-label">✦ 今日肯定语 ✦</div>
                    <div class="affirmation-text" id="affirmationText">我值得拥有宇宙赐予的一切美好</div>
                </div>
                <div class="card" onclick="switchPage('oracle')">
                    <div class="card-title">🔮 今日神谕</div>
                    <div class="card-subtitle">点击抽取你的每日指引卡片</div>
                </div>
            </div>

            <!-- PAGE 1: 显化工坊 -->
            <div class="page" id="page-manifest">
                <div class="app-header"><div class="greeting">🎯 <span>显化工坊</span></div></div>
                <div class="vision-grid" id="visionGrid">
                    <div class="vision-cell" onclick="editVisionCell(this)"><span class="cell-emoji">💖</span><span class="cell-label">爱与被爱</span></div>
                    <div class="vision-cell" onclick="editVisionCell(this)"><span class="cell-emoji">💰</span><span class="cell-label">财富丰盛</span></div>
                    <div class="vision-cell" onclick="editVisionCell(this)"><span class="cell-emoji">🏠</span><span class="cell-label">理想家园</span></div>
                    <div class="vision-cell" onclick="editVisionCell(this)"><span class="cell-emoji">✨</span><span class="cell-label">添加愿景</span></div>
                </div>
                <div class="card">
                    <div class="card-title">📝 显化清单</div>
                    <div class="gratitude-input-area">
                        <input type="text" id="manifestInput" placeholder="我感恩已经拥有了...">
                        <button class="btn-send" onclick="addManifestItem()">✧</button>
                    </div>
                    <div class="gratitude-list" id="manifestList"></div>
                </div>
            </div>

            <!-- PAGE 2: 神谕卡 -->
            <div class="page" id="page-oracle">
                <div class="app-header"><div class="greeting">🔮 <span>神谕指引</span></div></div>
                <div class="oracle-card" id="oracleCard" onclick="drawOracleCard()">
                    <div class="oracle-icon" id="oracleIcon">🌙</div>
                    <div class="oracle-name" id="oracleName">点击抽牌</div>
                    <div class="oracle-desc" id="oracleDesc">宇宙想要给你一条信息</div>
                </div>
                <div class="card" style="text-align:center;">
                    <div class="card-title" id="oracleTitle">✨ 宇宙指引</div>
                    <div class="card-subtitle" id="oracleGuidance">深呼吸，放松身心。</div>
                </div>
            </div>

            <!-- PAGE 3: 感恩日记 -->
            <div class="page" id="page-gratitude">
                <div class="app-header"><div class="greeting">🙏 <span>感恩日记</span></div></div>
                <div class="card">
                    <div class="gratitude-input-area">
                        <input type="text" id="gratitudeInput" placeholder="我感恩...">
                        <button class="btn-send" onclick="addGratitude()">♥</button>
                    </div>
                    <div class="gratitude-list" id="gratitudeList"></div>
                </div>
            </div>

            <!-- PAGE 4: 冥想空间 -->
            <div class="page" id="page-meditation">
                <div class="app-header"><div class="greeting">🧘 <span>冥想空间</span></div></div>
                <div class="meditation-circle" id="meditationCircle" onclick="toggleMeditation()">
                    <div class="meditation-time" id="meditationTime">05:00</div>
                    <div class="meditation-label">分钟</div>
                </div>
                <div class="meditation-presets">
                    <button class="preset-btn active-preset" onclick="setMeditationPreset(5, this)">5分</button>
                    <button class="preset-btn" onclick="setMeditationPreset(10, this)">10分</button>
                    <button class="preset-btn" onclick="setMeditationPreset(20, this)">20分</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" data-page="home" onclick="switchPage('home')"><span class="nav-icon">🏠</span>首页</button>
            <button class="nav-item" data-page="manifest" onclick="switchPage('manifest')"><span class="nav-icon">🎯</span>显化</button>
            <button class="nav-item" data-page="oracle" onclick="switchPage('oracle')"><span class="nav-icon">🔮</span>神谕<span class="nav-badge"></span></button>
            <button class="nav-item" data-page="gratitude" onclick="switchPage('gratitude')"><span class="nav-icon">🙏</span>感恩</button>
            <button class="nav-item" data-page="meditation" onclick="switchPage('meditation')"><span class="nav-icon">🧘</span>冥想</button>
        </div>

        <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
            <div class="modal-content" onclick="event.stopPropagation()">
                <h3 id="modalTitle">✨</h3>
                <p id="modalText"></p>
                <button onclick="closeModal()" style="margin-top:10px;">关闭</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            currentPage: 'home', energy: 777,
            angelNumbers: ['11:11', '22:22', '3:33', '4:44', '777', '888'],
            angelMeanings: ['天使在你身边', '相信过程', '勇敢前行', '你是安全的', '幸运涌来', '财富开启'],
            affirmations: ['我值得拥有美好', '我是丰盛的磁铁', '梦想正在显化', '我信任宇宙'],
            oracleCards: [
                { icon: '🌟', name: '新开始', desc: '开启新篇章', guidance: '勇敢迈出第一步。' },
                { icon: '🌊', name: '流动', desc: '不要抗拒', guidance: '顺应生命的河流。' },
                { icon: '🦋', name: '蜕变', desc: '美丽的转变', guidance: '相信这个过程。' }
            ],
            gratitudeItems: [], manifestItems: [],
            meditationSeconds: 300, meditationActive: false
        };

        function showToast(msg) {
            const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector(`[data-page="${p}"]`).classList.add('active');
        }

        function refreshEnergy() {
            state.energy = Math.floor(Math.random() * 300) + 700;
            document.getElementById('orbValue').textContent = state.energy;
            showToast('✨ 能量已更新');
        }

        function drawOracleCard() {
            const card = state.oracleCards[Math.floor(Math.random() * state.oracleCards.length)];
            document.getElementById('oracleIcon').textContent = card.icon;
            document.getElementById('oracleName').textContent = card.name;
            document.getElementById('oracleDesc').textContent = card.desc;
            document.getElementById('oracleTitle').textContent = card.name;
            document.getElementById('oracleGuidance').textContent = card.guidance;
            showToast('🔮 已抽取神谕');
        }

        function addGratitude() {
            const val = document.getElementById('gratitudeInput').value;
            if(!val) return;
            state.gratitudeItems.unshift(val);
            document.getElementById('gratitudeInput').value = '';
            renderList('gratitudeList', state.gratitudeItems);
        }

        function addManifestItem() {
            const val = document.getElementById('manifestInput').value;
            if(!val) return;
            state.manifestItems.unshift(val);
            document.getElementById('manifestInput').value = '';
            renderList('manifestList', state.manifestItems);
        }

        function renderList(id, items) {
            document.getElementById(id).innerHTML = items.map(i => `<div class="gratitude-item">✨ ${i}</div>`).join('');
        }

        function toggleMeditation() {
            const el = document.getElementById('meditationCircle');
            state.meditationActive = !state.meditationActive;
            if(state.meditationActive) {
                el.classList.add('active');
                state.timer = setInterval(() => {
                    if(state.meditationSeconds > 0) {
                        state.meditationSeconds--;
                        updateMedTimer();
                    } else { toggleMeditation(); }
                }, 1000);
            } else {
                el.classList.remove('active');
                clearInterval(state.timer);
            }
        }

        function updateMedTimer() {
            const m = Math.floor(state.meditationSeconds/60);
            const s = state.meditationSeconds%60;
            document.getElementById('meditationTime').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function setMeditationPreset(m, btn) {
            state.meditationSeconds = m * 60;
            updateMedTimer();
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active-preset'));
            btn.classList.add('active-preset');
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

        // Init stars
        const sc = document.getElementById('starsContainer');
        for (let i = 0; i < 50; i++) {
            const s = document.createElement('div'); s.className = 'star';
            s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
            s.style.setProperty('--dur', (Math.random()*3+2)+'s');
            sc.appendChild(s);
        }
    </script>
</body>
</html>
